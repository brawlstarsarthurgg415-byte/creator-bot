<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bot - Painel de Controle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1c1e;
            color: #ffffff;
        }
        .navbar {
            background-color: #111214;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #23272a;
        }
        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #5865F2;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #2b2d31;
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid #5865F2;
            font-size: 14px;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #4e5058;
        }
        .btn-discord {
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .container {
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
        }
        .panel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 600px) {
            .panel-grid { grid-template-columns: 1fr 1fr; }
        }
        .config-card {
            background-color: #23272a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #2f3136;
        }
        .config-card h3 {
            margin-top: 0;
            color: #5865F2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            display: block;
            margin: 10px 0 5px 0;
            font-size: 14px;
            color: #b9bbbe;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #111214;
            background-color: #1e1f22;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4e5058; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #23a55a; }
        input:checked + .slider:before { transform: translateX(24px); }
        .btn-save {
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🤖 MeuBot Painel</div>
        <div id="auth-area">
            <button class="btn-discord" onclick="loginDiscord()">🔗 Entrar com Discord</button>
        </div>
    </div>

    <div class="container">
        <h1>Configurações do Bot</h1>
        
        <div class="panel-grid">
            <div class="config-card">
                <div class="switch-container">
                    <h3>👋 Módulo Boas-Vindas</h3>
                    <label class="switch">
                        <input type="checkbox" id="welcome_active">
                        <span class="slider"></span>
                    </label>
                </div>
                <label>Mensagem de Entrada:</label>
                <input type="text" id="welcome_msg" value="">
            </div>

            <div class="config-card">
                <div class="switch-container">
                    <h3>🛡️ Sistema Anti-Link</h3>
                    <label class="switch">
                        <input type="checkbox" id="antilink_active">
                        <span class="slider"></span>
                    </label>
                </div>
                <p style="font-size: 14px; color: #b9bbbe; margin: 0;">Apaga links automaticamente.</p>
            </div>
        </div>

        <button class="btn-save" onclick="salvarConfiguracoes()">💾 Salvar Alterações</button>
    </div>

    <script>
        const CLIENT_ID = '1510318463334350999'; 
        
        function loginDiscord() {
            const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirectUri}&response_type=token&scope=identify`;
        }

        function checarLogin() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            let token = fragment.get('access_token') || localStorage.getItem('discord_token');

            if (fragment.get('access_token')) {
                localStorage.setItem('discord_token', token);
                window.location.hash = ''; 
            }

            if (token) {
                fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                })
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(user => {
                    const avatarUrl = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
                    document.getElementById('auth-area').innerHTML = `
                        <div class="user-profile">
                            <img class="user-avatar" src="${avatarUrl}">
                            <span>🟢 <b>${user.username}</b></span>
                        </div>
                    `;
                    carregarConfiguracoes(user.id);
                })
                .catch(() => {
                    localStorage.removeItem('discord_token');
                });
            }
        }

        function carregarConfiguracoes(userId) {
            const dadosSalvos = localStorage.getItem('config_' + userId);
            if (dadosSalvos) {
                const dados = JSON.parse(dadosSalvos);
                document.getElementById('welcome_active').checked = dados.boasVindas.ativo;
                document.getElementById('welcome_msg').value = dados.boasVindas.mensagem;
                document.getElementById('antilink_active').checked = dados.antiLink.ativo;
            } else {
                document.getElementById('welcome_active').checked = true;
                document.getElementById('welcome_msg').value = "Seja bem-vindo!";
                document.getElementById('antilink_active').checked = false;
            }
        }

        function salvarConfiguracoes() {
            const token = localStorage.getItem('discord_token');
            if (!token) {
                alert("❌ Você precisa entrar com o Discord primeiro!");
                return;
            }

            fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                const novasConfiguracoes = {
                    boasVindas: {
                        ativo: document.getElementById('welcome_active').checked,
                        mensagem: document.getElementById('welcome_msg').value
                    },
                    antiLink: {
                        ativo: document.getElementById('antilink_active').checked
                    }
                };
                localStorage.setItem('config_' + user.id, JSON.stringify(novasConfiguracoes));
                alert(`💾 Salvo com sucesso para a conta ${user.username}!`);
            });
        }

        window.onload = checarLogin;
    </script>
</body>
</html>
