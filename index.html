<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bot - Painel de Controle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1c1e;
            color: #ffffff;
        }
        .navbar {
            background-color: #111214;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #23272a;
        }
        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #5865F2;
        }
        .user-profile {
            background-color: #2b2d31;
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid #23a55a;
            font-size: 14px;
        }
        .container {
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
        }
        .panel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 600px) {
            .panel-grid { grid-template-columns: 1fr 1fr; }
        }
        .config-card {
            background-color: #23272a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #2f3136;
        }
        .config-card h3 {
            margin-top: 0;
            color: #5865F2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            display: block;
            margin: 10px 0 5px 0;
            font-size: 14px;
            color: #b9bbbe;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #111214;
            background-color: #1e1f22;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4e5058; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #23a55a; }
        input:checked + .slider:before { transform: translateX(24px); }
        .btn-save {
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-save:hover { background-color: #404eed; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">😁creator bot</div>
        <div class="user-profile">
            🟢 Logado como: <b>ARTHURGG415</b>
        </div>
    </div>
